name: deploy-course-site

# Builds the Jupyter Book in site/ and publishes it to GitHub Pages.
# Runs entirely in GitHub's cloud — your laptop is never needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Jupyter Book
        run: pip install -r site/requirements.txt
      # Compile every self-contained handbook .tex to PDF with full TeX Live in
      # Docker. The loop attempts each file independently (|| true) so one bad
      # file can never abort the others or block the site.
      - name: Compile theory handbooks (LaTeX -> PDF)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD":/work -w /work --entrypoint bash \
            ghcr.io/xu-cheng/texlive-full:latest -c '
              set +e
              for f in $(find . -name "*.tex" -not -path "./site/*"); do
                d=$(dirname "$f"); b=$(basename "$f" .tex)
                echo "::group::compile $f"
                ( cd "$d" && latexmk -pdf -interaction=nonstopmode "$b.tex" ) || echo "WARN: $b failed to compile"
                echo "::endgroup::"
              done
              echo "Compiled PDFs:"; find . -name "*.pdf" -not -path "./site/*"
            '
      - name: Build the book
        run: jupyter-book build site/
      # Publish the compiled PDFs under the live site at /pdfs/<name>.pdf
      - name: Collect compiled PDFs into the site
        run: |
          mkdir -p site/_build/html/pdfs
          find . -name "*.pdf" -not -path "./site/*" -exec cp -v {} site/_build/html/pdfs/ \;
          echo "PDFs published:"; ls -1 site/_build/html/pdfs/ || true
      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
