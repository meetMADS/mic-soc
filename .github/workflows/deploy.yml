name: deploy-course-site

# Builds the Jupyter Book in site/ and publishes it to GitHub Pages.
# Runs entirely in GitHub's cloud — your laptop is never needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Turns Pages on automatically (build_type=workflow) so no manual
      # Settings -> Pages click is needed. Requires the pages:write permission
      # declared above.
      - name: Enable & configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Jupyter Book
        run: pip install -r site/requirements.txt
      - name: Build the book
        run: jupyter-book build site/
      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
