# Jupyter Book configuration — Medical Image Computing, Summer of Code
title: "Medical Image Computing — Summer of Code"
author: "MIC Summer-of-Code"
# logo: logo.png   # optional: drop a logo image in site/ and point here

# Build the toc files plus a few orphan pages (mentor admin, how-to-publish)
# that are intentionally kept out of the public navigation.
only_build_toc_files: false

# Do NOT execute notebooks during the build: our notebooks ship without outputs,
# and this keeps the cloud build light (no numpy/torch needed to publish).
# Flip to "auto" and add the libraries to requirements.txt if you want the
# figures rendered into the pages.
execute:
  execute_notebooks: "off"

html:
  use_issues_button: true
  use_repository_button: true
  home_page_in_navbar: true
  extra_footer: |
    <p>MIC Summer-of-Code. Slides &copy; Prof. Suyash P. Awate (CS-736, IIT Bombay), used with attribution; the slide files themselves are not redistributed here.</p>

# Used by the repo/issue buttons in the page header.
repository:
  url: https://github.com/meetMADS/mic-soc
  branch: main
  path_to_book: site

launch_buttons:
  colab_url: "https://colab.research.google.com"

sphinx:
  config:
    html_show_copyright: false
    html_static_path: ["_static"]
    html_css_files:
      - custom.css
      - locks.css
      - progress.css
    html_js_files:
      - locks.js
      - admin.js
      - progress.js
